<style>
  :root {
    --header-height: 3.5rem;

    /*========== z index ==========*/
    --z-tooltip: 10;
    --z-fixed: 100;
  }

  /*=============== BASE ===============*/
  * {
    box-sizing: border-box;
    padding: 0;
    margin: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  ul {
    list-style: none;
  }

  a {
    text-decoration: none;
  }

  /*=============== REUSABLE CSS CLASSES ===============*/
  .container {
    max-width: 100%;
    margin-inline: 1.5rem;
  }

  /*=============== HEADER ===============*/
  .header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    /* background-image: url('https://www.tiarahana.com/wp-content/uploads/2024/02/Mask-Group-1582-scaled.webp'); */
    background-color: #091828;
    background-position: center;
    background-size: cover;
    box-shadow: 0 2px 16px hsla(220, 32%, 8%, 0.3);
    z-index: var(--z-fixed);
    padding-block: 3%;
  }

  /*=============== NAV ===============*/
  .nav {
    height: var(--header-height);
  }

  .nav__burger,
  .nav__close {
    color: #fff;
  }

  .nav__data {
    height: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav__logo {
    width: 45%;
    position: relative;
  }

  .nav_logo img {
    width: 100%;
    display: block;
  }

  .nav__logoMobile {
    width: 45%;
    position: relative;
  }

  .nav__logoMobile img {
    width: 100%;
    display: block;
  }

  .nav__toggle {
    position: relative;
    width: 32px;
    height: 32px;
    -webkit-transform: rotate(0deg);
    -moz-transform: rotate(0deg);
    -o-transform: rotate(0deg);
    transform: rotate(0deg);
    -webkit-transition: 0.5s ease-in-out;
    -moz-transition: 0.5s ease-in-out;
    -o-transition: 0.5s ease-in-out;
    transition: 0.5s ease-in-out;
    cursor: pointer;
  }

  .nav__toggle span {
    display: block;
    position: absolute;
    height: 3px;
    width: 100%;
    background: #d3531a;
    border-radius: 9px;
    opacity: 1;
    left: 0;
    -webkit-transform: rotate(0deg);
    -moz-transform: rotate(0deg);
    -o-transform: rotate(0deg);
    transform: rotate(0deg);
    -webkit-transition: 0.25s ease-in-out;
    -moz-transition: 0.25s ease-in-out;
    -o-transition: 0.25s ease-in-out;
    transition: 0.25s ease-in-out;
  }

  #nav-toggle span:nth-child(1) {
    top: 6px;
    -webkit-transform-origin: left center;
    -moz-transform-origin: left center;
    -o-transform-origin: left center;
    transform-origin: left center;
  }

  #nav-toggle span:nth-child(2) {
    top: 18px;
    -webkit-transform-origin: left center;
    -moz-transform-origin: left center;
    -o-transform-origin: left center;
    transform-origin: left center;
  }

  #nav-toggle span:nth-child(3) {
    top: 30px;
    -webkit-transform-origin: left center;
    -moz-transform-origin: left center;
    -o-transform-origin: left center;
    transform-origin: left center;
  }

  #nav-toggle.open span:nth-child(1) {
    -webkit-transform: rotate(45deg);
    -moz-transform: rotate(45deg);
    -o-transform: rotate(45deg);
    transform: rotate(45deg);
    top: 8px;
    left: 8px;
  }

  #nav-toggle.open span:nth-child(2) {
    width: 0%;
    opacity: 0;
  }

  #nav-toggle.open span:nth-child(3) {
    -webkit-transform: rotate(-45deg);
    -moz-transform: rotate(-45deg);
    -o-transform: rotate(-45deg);
    transform: rotate(-45deg);
    top: 30px;
    left: 8px;
  }

  .nav__burger,
  .nav__close {
    position: absolute;
    width: max-content;
    height: max-content;
    inset: 0;
    margin: auto;
    font-size: 2rem;
    cursor: pointer;
    transition:
      opacity 0.1s,
      transform 0.4s;
  }

  .nav__close {
    opacity: 0;
  }

  /* Navigation for mobile devices */
  @media screen and (max-width: 991.98px) {
    .nav__menu {
      position: absolute;
      left: 0;
      top: 2.5rem;
      width: 100%;
      height: 100vh;
      overflow: auto;
      pointer-events: none;
      opacity: 0;
      transition:
        top 1s,
        opacity 1s;

  .nav__link {

    display: flex;
    justify-content: flex-start;
    align-items: center;
    transition: background-color 0.3s;
    gap: 20px;

  .nav__link:hover {

  }

  /* Show menu */
  .show-menu {
    opacity: 1;
    top: 4.9rem;
    pointer-events: initial;
  }

  /* Show icon */
  .show-icon .nav__burger {
    opacity: 0;
    transform: rotate(90deg);
  }

  .show-icon .nav__close {
    opacity: 1;
    transform: rotate(90deg);
  }

  /*=============== DROPDOWN ===============*/
  .dropdown__item {
    cursor: pointer;
  }

  .dropdown__arrow {
    font-size: 2rem;
    font-weight: initial;
    transition: transform 0.4s;
  }

  .dropdown__arrow1 {
    font-size: 2rem;
    font-weight: initial;

  .dropdown__link,

<script>
  const showMenu = (toggleId, navId) => {
    const toggle = document.getElementById(toggleId),
      nav = document.getElementById(navId);

    if (toggle && nav) {
      toggle.addEventListener("click", () => {
        nav.classList.toggle("show-menu"); // Tampilkan menu
        toggle.classList.toggle("open"); // Ubah ikon toggle
      });
    }
  };

  showMenu("nav-toggle", "nav-menu");
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const dropdownItem1 = document.querySelector(".dropdown__item1");
    const dropdownMenu1 = dropdownItem1.querySelector(".dropdown__menu1");
    const dropdownArrow1 = dropdownItem1.querySelector(".dropdown__arrow1");

    dropdownItem1.addEventListener("click", function () {
      const isOpen = dropdownMenu1.classList.contains("show-dropdown1");

      if (isOpen) {
        dropdownMenu1.classList.remove("show-dropdown1");
        dropdownArrow1.style.transform = "rotate(0deg)"; // Panah kembali ke bawah
      } else {
        dropdownMenu1.classList.add("show-dropdown1");
        dropdownArrow1.style.transform = "rotate(180deg)"; // Panah ke atas
      }
    });
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const dropdownItem = document.querySelector(".dropdown__item");
    const dropdownMenu = dropdownItem.querySelector(".dropdown__menu");
    const dropdownArrow = dropdownItem.querySelector(".dropdown__arrow");

    dropdownItem.addEventListener("click", function () {
      const isOpen = dropdownMenu.classList.contains("show-dropdown");

      if (isOpen) {
        dropdownMenu.classList.remove("show-dropdown");
        dropdownArrow.style.transform = "rotate(0deg)"; // Panah kembali ke bawah
      } else {
        dropdownMenu.classList.add("show-dropdown");
        dropdownArrow.style.transform = "rotate(180deg)"; // Panah ke atas
      }
    });
  });
</script>
