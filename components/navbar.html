<style>
  /*=============== BASE ===============*/
  * {
    box-sizing: border-box;
    padding: 0;
    margin: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  ul {
    list-style: none;
  }

  a {
    text-decoration: none;
  }

  button {
    font: inherit;
  }

  :root {
    --navy: #071827;
    --ivory: #fdfcf8;
    --gold: #c89a3d;
    --gold-soft: #e6c98d;
    --ink: #071827;
    --shadow-soft: 0 12px 35px rgba(7, 24, 39, 0.14);
    --shadow-dropdown: 0 18px 40px rgba(7, 24, 39, 0.22);
    --font-serif: Georgia, "Times New Roman", serif;
    --container: min(100% - 64px, 1420px);
    --mobile-height: 72px;
  }

  .site-header {
    width: 100%;
    z-index: 1000;
  }

  .site-header.is-sticky {
    position: sticky;
    top: 0;
  }

  .nav-shell {
    width: var(--container);
    margin: 0 auto;
  }

  .brand {
    width: 12%;
    position: relative;
  }

  .brand img {
    width: 100%;
    display: block;
  }

  .brand-mark {
    position: relative;
    display: grid;
    place-items: center;
    width: 56px;
    height: 56px;
    color: var(--ivory);
    background: var(--gold);
    clip-path: polygon(
      50% 0%,
      62% 13%,
      80% 10%,
      90% 25%,
      100% 50%,
      90% 75%,
      80% 90%,
      62% 87%,
      50% 100%,
      38% 87%,
      20% 90%,
      10% 75%,
      0% 50%,
      10% 25%,
      20% 10%,
      38% 13%
    );
    flex: 0 0 auto;
  }

  .brand-mark::before {
    content: "";
    position: absolute;
    inset: 9px;
    border: 1.5px solid rgba(255, 255, 255, 0.72);
    clip-path: inherit;
  }

  .brand-mark span {
    position: relative;
    font-family: var(--font-serif);
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.06em;
  }

  .brand-name {
    font-family: var(--font-serif);
    font-size: clamp(24px, 2vw, 32px);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .nav-link {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    color: var(--ivory);
    font: normal normal 400 20px/25px Avenir;
    background: transparent;
    border: 0;
    cursor: pointer;
    transition:
      color 0.25s ease,
      opacity 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-link::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 2px;
    width: 0;
    height: 1px;
    background: var(--gold);
    transform: translateX(-50%);
    transition: width 0.25s ease;
  }

  .nav-link:hover,
  .nav-link:focus-visible {
    color: var(--gold-soft);
    outline: none;
  }

  .nav-link:hover::after,
  .nav-link:focus-visible::after {
    width: 26px;
  }

  .desktop-header {
    display: block;
    background: #091828;
    color: var(--ivory);
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16);
    padding-block: 15px;
  }

  .desktop-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
    width: 100%;
    padding-inline: 40px;
  }

  .desktop-header .brand-name {
    color: var(--ivory);
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
  }

  .desktop-menu {
    display: flex;
    align-items: center;
    gap: clamp(24px, 2.6vw, 42px);
  }

  .mobile-header {
    display: none;
    background: var(--ivory);
    color: var(--ink);
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16);
    padding-block: 5px;
  }

  .mobile-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding-inline: 20px;
    padding-block: 20px;
  }

  .mobile-header .brand-mark {
    width: 38px;
    height: 38px;
    background: var(--navy);
  }

  .mobile-header .brand-mark::before {
    inset: 6px;
  }

  .mobile-header .brand-mark span {
    font-size: 21px;
  }

  .mobile-header .brand-name {
    color: var(--navy);
    font-size: 18px;
    letter-spacing: 0.08em;
  }

  .hamburger,
  .drawer-close {
    display: inline-grid;
    place-items: center;
    width: 44px;
    height: 44px;
    padding: 0;
    border: 0;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }

  .hamburger-lines,
  .close-lines {
    position: relative;
    width: 30px;
    height: 22px;
    display: block;
  }

  .hamburger-lines::before,
  .hamburger-lines::after,
  .hamburger-lines span {
    content: "";
    position: absolute;
    right: 0;
    height: 3px;
    background: var(--ink);
    border-radius: 99px;
    transition:
      width 0.25s ease,
      transform 0.25s ease;
  }

  .hamburger-lines::before {
    top: 0;
    width: 100%;
  }

  .hamburger-lines span {
    top: 50%;
    width: 100%;
    transform: translateY(-50%);
  }

  .hamburger-lines::after {
    bottom: 0;
    width: 100%;
  }

  .drawer-close .close-lines::before,
  .drawer-close .close-lines::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 24px;
    height: 2px;
    background: var(--ink);
    border-radius: 99px;
  }

  .drawer-close .close-lines::before {
    transform: translate(-50%, -50%) rotate(45deg);
  }

  .drawer-close .close-lines::after {
    transform: translate(-50%, -50%) rotate(-45deg);
  }

  .drawer-backdrop {
    position: fixed;
    inset: 0;
    z-index: 1100;
    background: rgba(7, 24, 39, 0.42);
    opacity: 0;
    visibility: hidden;
    transition:
      opacity 0.28s ease,
      visibility 0.28s ease;
  }

  .drawer-backdrop.is-open {
    opacity: 1;
    visibility: visible;
  }

  .mobile-drawer {
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 1200;
    width: min(100vw, 420px);
    min-height: 100vh;
    background: var(--ivory);
    color: var(--ink);
    transform: translateX(-104%);
    transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: var(--shadow-soft);
    overflow-y: auto;
  }

  .mobile-drawer.is-open {
    transform: translateX(0);
  }

  .drawer-inner {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 28px 28px 32px;
  }

  .drawer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 32px;
  }

  .drawer-head .brand-mark {
    width: 46px;
    height: 46px;
    background: var(--navy);
  }

  .drawer-head .brand-mark span {
    font-size: 25px;
  }

  .drawer-head .brand-name {
    color: var(--navy);
    font-size: 20px;
  }

  .mobile-nav {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
  }

  .mobile-nav-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    width: 100%;
    padding: 12px 0;
    color: #091828;
    font: normal normal 400 21px/23px Avenir;
    background: transparent;
    border: 0;
    text-align: left;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .mobile-nav-link:hover,
  .mobile-nav-link:focus-visible {
    color: var(--gold);
    outline: none;
  }

  @media (max-width: 1180px) {
    :root {
      --container: min(100% - 40px, 1120px);
    }

    .desktop-menu {
      gap: 24px;
    }

    .nav-link {
      font-size: 15px;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
    }

    .brand-name {
      font-size: 25px;
    }

    .desktop-nav {
      padding-inline: 25px;
    }

    .brand {
      width: 15%;
    }
  }

  @media (max-width: 900px) {
    :root {
      --container: 100%;
    }

    .desktop-header {
      display: none;
    }

    .mobile-header {
      display: block;
    }

    .brand {
      width: 30%;
    }
  }

  @media (max-width: 480px) {
    .mobile-topbar {
      padding-inline: 18px;
    }

    .mobile-header .brand-name {
      font-size: 16px;
    }

    .drawer-inner {
      padding: 26px 15px 30px;
    }

    .mobile-drawer {
      width: 100vw;
    }

    .brand {
      width: 40%;
    }
  }
</style>

<header class="site-header is-sticky" data-header>
  <div class="desktop-header" aria-label="Desktop navigation">
    <div class="nav-shell desktop-nav">
      <a class="brand" href="#" aria-label="Tiara Hana Home">
        <img src="./assets/Images/Logo-Tiara-Hana-Main.webp" alt="" />
      </a>

      <nav class="desktop-menu" aria-label="Main navigation">
        <a class="nav-link" href="#home">Home</a>
        <a class="nav-link" href="#about">About Us</a>
        <a class="nav-link" href="#resort">Khastana Hadi Resort Ubud</a>
      </nav>
    </div>
  </div>

  <div class="mobile-header" aria-label="Mobile navigation">
    <div class="mobile-topbar">
      <a class="brand" href="#" aria-label="Tiara Hana Home">
        <img src="./assets/Images/Logo-Tiara-Hana-Blue.webp" alt="" />
      </a>

      <button
        class="hamburger"
        type="button"
        data-open-menu
        aria-label="Open menu"
        aria-controls="mobileDrawer"
        aria-expanded="false"
      >
        <span class="hamburger-lines" aria-hidden="true"><span></span></span>
      </button>
    </div>
  </div>
</header>

<div class="drawer-backdrop" data-backdrop></div>

<aside
  class="mobile-drawer"
  id="mobileDrawer"
  data-mobile-drawer
  aria-label="Mobile menu"
  aria-hidden="true"
>
  <div class="drawer-inner">
    <div class="drawer-head">
      <a class="brand" href="#" aria-label="Tiara Hana Home">
        <img src="./assets/Images/Logo-Tiara-Hana-Blue.webp" alt="" />
      </a>

      <button
        class="drawer-close"
        type="button"
        data-close-menu
        aria-label="Close menu"
      >
        <span class="close-lines" aria-hidden="true"></span>
      </button>
    </div>

    <nav class="mobile-nav" aria-label="Mobile main navigation">
      <a class="mobile-nav-link" href="#home">Home</a>
      <a class="mobile-nav-link" href="#about">About Us</a>
      <a class="mobile-nav-link" href="#resort">Khastana Hadi Resort Ubud</a>
    </nav>
  </div>
</aside>
